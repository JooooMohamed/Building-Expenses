version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: building-expenses

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build: ./backend
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/building-expenses
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 30d
    depends_on:
      - mongodb
      - redis

volumes:
  mongo_data:
